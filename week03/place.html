<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover Lagos, Nigeria">
    <meta name="author" content="Nsisong Ekwere Akpakpan">

    <title>Lagos, Nigeria</title>

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>
<body>

    <header>
        <h1>Lagos, Nigeria</h1>
    </header>

    <main>

        <section class="hero">
            <picture>
                <source
                    srcset="images/lagos-large.webp"
                    media="(min-width: 768px)">

                <img
                    src="images/lagos-small.webp"
                    alt="Beautiful view of Lagos, Nigeria"
                    width="500"
                    height="700">
            </picture>
        </section>

        <section class="content-grid">

            <section class="card data-card">
                <h2>Data</h2>

                <p><strong>Country:</strong> Nigeria</p>
                <p><strong>Population:</strong> 21 Million+</p>
                <p><strong>Language:</strong> English</p>
                <p><strong>Currency:</strong> Nigerian Naira</p>
                <p><strong>Famous For:</strong> Beaches, nightlife, tech startups</p>
            </section>

            <section class="card weather-card">
                <h2>Weather</h2>

                <img
                    src="images/weather-icon.svg"
                    alt="Weather icon"
                    class="weather-icon">

                <p><strong>Temperature:</strong> <span id="temperature">28</span> °C</p>
                <p><strong>Conditions:</strong> Partly Cloudy</p>
                <p><strong>Wind Speed:</strong> <span id="windSpeed">10</span> km/h</p>
                <p><strong>Wind Chill:</strong> <span id="windChill"></span></p>
            </section>

        </section>

    </main>

    <footer>
        <p>
            &copy; <span id="currentyear"></span> | Nsisong Ekwere Akpakpan | Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
